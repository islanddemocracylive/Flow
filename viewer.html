<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flow State – Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a14; overflow: hidden; height: 100vh; height: 100dvh; }
    #room3d-container { width: 100vw; height: 100vh; height: 100dvh; position: relative; display: flex; align-items: center; justify-content: center; }
    #room3d-container canvas { display: block; }
    #status {
      position: fixed; top: 12px; right: 16px;
      color: #666; font: 12px/1 monospace;
      z-index: 10; user-select: none;
    }
    #status.connected { color: #4a4; }

    /* Hide touch controls on desktop (no touchscreen) */
    @media (hover: hover) and (pointer: fine) {
      .joystick-zone, .spray-btn, #crosshair { display: none !important; }
    }

    /* Joystick zones */
    .joystick-zone {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      width: 100px;
      height: 100px;
      z-index: 50;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #joystick-left {
      left: calc(20px + env(safe-area-inset-left, 0px));
    }
    #joystick-right {
      right: calc(20px + env(safe-area-inset-right, 0px));
    }
    .joystick-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
      position: relative;
    }
    .joystick-thumb {
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Spray buttons — flanking the joysticks */
    .spray-btn {
      position: absolute;
      bottom: calc(42px + env(safe-area-inset-bottom, 0px));
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(68, 170, 255, 0.2);
      border: 2px solid rgba(68, 170, 255, 0.4);
      color: rgba(200, 230, 255, 0.8);
      font: bold 10px/1 sans-serif;
      cursor: pointer;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #spray-btn-left {
      left: calc(130px + env(safe-area-inset-left, 0px));
    }
    #spray-btn-right {
      right: calc(130px + env(safe-area-inset-right, 0px));
    }
    .spray-btn:active, .spray-btn.active {
      background: rgba(68, 170, 255, 0.5);
      border-color: rgba(100, 200, 255, 0.7);
    }

    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
      z-index: 40;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.4);
    }
    #crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
    #crosshair::after  { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
  </style>
</head>
<body>
  <div id="room3d-container">
    <div id="crosshair"></div>

    <!-- Left joystick (movement) -->
    <div id="joystick-left" class="joystick-zone">
      <div class="joystick-ring"><div class="joystick-thumb"></div></div>
    </div>

    <!-- Spray buttons flanking joysticks -->
    <button id="spray-btn-left" class="spray-btn" aria-label="Spray water">SPRAY</button>
    <button id="spray-btn-right" class="spray-btn" aria-label="Spray water">SPRAY</button>

    <!-- Right joystick (look/aim) -->
    <div id="joystick-right" class="joystick-zone">
      <div class="joystick-ring"><div class="joystick-thumb"></div></div>
    </div>
  </div>
  <div id="status">Connecting...</div>

  <!-- Firefighter HUD overlay -->
  <div id="viewer-hud" style="
    position: fixed; top: 12px; left: 16px; z-index: 10;
    font: bold 13px/1.6 monospace; user-select: none; pointer-events: none;
  ">
    <div id="hud-gas" style="color: #aaa;">Gas: --</div>
    <div id="hud-hrr" style="color: rgba(255,180,80,0.8);">HRR: --</div>
    <div id="hud-o2" style="color: rgba(100,200,100,0.8);">O&#8322;: --</div>
    <div id="hud-vent" style="color: rgba(100,150,255,0.8); display:none;">VENT LIMITED</div>
  </div>

  <!-- Win/lose overlay -->
  <div id="viewer-endstate" style="
    position: fixed; inset: 0; z-index: 20;
    display: none; align-items: center; justify-content: center;
    font: bold 36px/1 sans-serif; text-align: center;
    pointer-events: none;
  "></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script type="module" src="js/viewer-app.js"></script>
</body>
</html>
