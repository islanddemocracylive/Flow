<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire &amp; Water Ceiling Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Ceiling Fire Simulation</h1>
      <p class="subtitle">Click the ceiling to start fires. Click &amp; drag to spray water.</p>
    </header>

    <div id="main-container">
      <canvas id="simulation-canvas"></canvas>

      <aside id="admin-panel">
        <h2>Controls</h2>

        <div class="control-group">
          <h3>Mode</h3>
          <div class="button-row">
            <button id="btn-fire-mode" class="mode-btn active" title="Click to place fire">Place Fire</button>
            <button id="btn-water-mode" class="mode-btn" title="Click & drag to spray water">Spray Water</button>
          </div>
        </div>

        <div class="control-group">
          <h3>Fire Settings</h3>
          <label>
            Spread Speed
            <input type="range" id="spread-speed" min="0.1" max="5" step="0.1" value="1.5">
            <span class="value-display" id="spread-speed-val">1.5</span>
          </label>
          <label>
            Ignition Threshold
            <input type="range" id="ignition-threshold" min="0.05" max="0.5" step="0.01" value="0.15">
            <span class="value-display" id="ignition-threshold-val">0.15</span>
          </label>
          <label>
            Max Intensity
            <input type="range" id="max-intensity" min="0.5" max="1" step="0.05" value="1">
            <span class="value-display" id="max-intensity-val">1.0</span>
          </label>
        </div>

        <div class="control-group">
          <h3>Water Settings</h3>
          <label>
            Suppression Strength
            <input type="range" id="water-strength" min="0.5" max="10" step="0.5" value="3">
            <span class="value-display" id="water-strength-val">3.0</span>
          </label>
          <label>
            Spray Radius
            <input type="range" id="water-radius" min="1" max="8" step="1" value="3">
            <span class="value-display" id="water-radius-val">3</span>
          </label>
        </div>

        <div class="control-group">
          <h3>Display</h3>
          <label>
            Grid Resolution
            <select id="grid-resolution">
              <option value="80">Low (80×60)</option>
              <option value="120" selected>Medium (120×90)</option>
              <option value="200">High (200×150)</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="show-grid"> Show grid lines
          </label>
        </div>

        <div class="control-group">
          <h3>Actions</h3>
          <div class="button-row">
            <button id="btn-pause" class="action-btn">Pause</button>
            <button id="btn-reset" class="action-btn danger">Reset</button>
          </div>
        </div>

        <div class="control-group stats">
          <h3>Statistics</h3>
          <div class="stat-row"><span>Cells on fire:</span><span id="stat-burning">0</span></div>
          <div class="stat-row"><span>Fire coverage:</span><span id="stat-coverage">0%</span></div>
          <div class="stat-row"><span>Avg intensity:</span><span id="stat-intensity">0.00</span></div>
        </div>
      </aside>
    </div>
  </div>

  <script src="simulation.js"></script>
  <script src="app.js"></script>
</body>
</html>
